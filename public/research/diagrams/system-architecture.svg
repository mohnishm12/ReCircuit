<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">System Architecture</title>
  <desc id="desc">Original ReCircuit research diagram.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7DF9FF"/>
    </marker>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#050706"/>
      <stop offset="1" stop-color="#101613"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="60" y="72" fill="#F5F7F2" font-size="30" font-family="Inter, Arial" font-weight="800">System Architecture</text>
  <text x="60" y="105" fill="#9CA3AF" font-size="15" font-family="Inter, Arial">ReCircuit Research Whitepaper v2.0</text>

  <rect x="60" y="170" width="190" height="74" rx="10" fill="#111816" stroke="#6EA8FE" stroke-width="1.4"/>
  <text x="155.0" y="203.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">Frontend</text>

<line x1="250" y1="207" x2="335" y2="207" stroke="#7DF9FF" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>

  <rect x="335" y="170" width="190" height="74" rx="10" fill="#111816" stroke="#7DF9FF" stroke-width="1.4"/>
  <text x="430.0" y="203.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">API Layer</text>

<line x1="525" y1="207" x2="610" y2="207" stroke="#7DF9FF" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>

  <rect x="610" y="170" width="230" height="74" rx="10" fill="#111816" stroke="#14F195" stroke-width="1.4"/>
  <text x="725.0" y="203.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">Backend Services</text>

<line x1="725" y1="244" x2="725" y2="318" stroke="#7DF9FF" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>

  <rect x="610" y="318" width="230" height="74" rx="10" fill="#111816" stroke="#F8C14A" stroke-width="1.4"/>
  <text x="725.0" y="351.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">Data Pipeline</text>

<line x1="840" y1="355" x2="930" y2="355" stroke="#7DF9FF" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>

  <rect x="930" y="318" width="205" height="74" rx="10" fill="#111816" stroke="#6EA8FE" stroke-width="1.4"/>
  <text x="1032.5" y="351.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">Evidence Store</text>

<line x1="725" y1="392" x2="725" y2="465" stroke="#7DF9FF" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>

  <rect x="610" y="465" width="230" height="74" rx="10" fill="#111816" stroke="#7DF9FF" stroke-width="1.4"/>
  <text x="725.0" y="498.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">Reporting Exports</text>


  <rect x="930" y="170" width="205" height="74" rx="10" fill="#111816" stroke="#14F195" stroke-width="1.4"/>
  <text x="1032.5" y="203.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">AI Layer</text>

<line x1="930" y1="207" x2="840" y2="207" stroke="#7DF9FF" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>
<text x="60" y="590" fill="#9CA3AF" font-size="16" font-family="Inter, Arial">Current: research + prototype architecture. Future: secure services, model evaluation, integrations, audit exports.</text>
