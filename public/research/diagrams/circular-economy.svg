  <text x="580.0" y="580.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">Component Recovery</text>


  <rect x="210" y="415" width="190" height="64" rx="10" fill="#111816" stroke="#14F195" stroke-width="1.4"/>
