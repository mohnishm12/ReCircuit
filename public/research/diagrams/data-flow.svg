<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Data Flow</title>
  <desc id="desc">Original ReCircuit research diagram.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7DF9FF"/>
    </marker>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#050706"/>
      <stop offset="1" stop-color="#101613"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="60" y="72" fill="#F5F7F2" font-size="30" font-family="Inter, Arial" font-weight="800">Data Flow</text>
  <text x="60" y="105" fill="#9CA3AF" font-size="15" font-family="Inter, Arial">ReCircuit Research Whitepaper v2.0</text>

  <rect x="72" y="250" width="160" height="72" rx="10" fill="#111816" stroke="#14F195" stroke-width="1.4"/>
  <text x="152.0" y="282.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">Intake</text>

<line x1="232" y1="286" x2="310" y2="286" stroke="#7DF9FF" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>

  <rect x="310" y="250" width="170" height="72" rx="10" fill="#111816" stroke="#7DF9FF" stroke-width="1.4"/>
  <text x="395.0" y="282.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">Validation</text>

<line x1="480" y1="286" x2="558" y2="286" stroke="#7DF9FF" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>

  <rect x="558" y="250" width="190" height="72" rx="10" fill="#111816" stroke="#6EA8FE" stroke-width="1.4"/>
  <text x="653.0" y="282.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">Model Review</text>

<line x1="748" y1="286" x2="826" y2="286" stroke="#7DF9FF" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>

  <rect x="826" y="250" width="180" height="72" rx="10" fill="#111816" stroke="#F8C14A" stroke-width="1.4"/>
  <text x="916.0" y="282.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">Decision</text>

<line x1="916" y1="322" x2="916" y2="410" stroke="#7DF9FF" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>

  <rect x="790" y="410" width="252" height="72" rx="10" fill="#111816" stroke="#14F195" stroke-width="1.4"/>
  <text x="916.0" y="442.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">ESG Evidence Packet</text>

<line x1="558" y1="286" x2="558" y2="410" stroke="#7DF9FF" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>

  <rect x="445" y="410" width="226" height="72" rx="10" fill="#111816" stroke="#7DF9FF" stroke-width="1.4"/>
  <text x="558.0" y="442.0" text-anchor="middle" fill="#F5F7F2" font-size="16" font-family="Inter, Arial" font-weight="700">Human Override Log</text>

<text x="72" y="560" fill="#9CA3AF" font-size="16" font-family="Inter, Arial">Evidence never disappears: raw inputs, model outputs, decisions, and overrides remain traceable.</text>
</svg>
